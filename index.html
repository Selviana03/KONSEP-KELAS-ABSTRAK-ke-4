<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan OOP Dart - Tugas 1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #console-output { 
            background: #282c34; 
            color: #98c379; 
            padding: 15px; 
            border-radius: 5px; 
            white-space: pre-wrap; 
            font-family: 'Courier New', Courier, monospace;
            min-height: 300px;
        }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Output Program OOP Dart</h1>
        <p>Hasil eksekusi logika pemrograman:</p>
        
        <div id="console-output">Menunggu program dijalankan...</div>
        
        <button class="btn" onclick="jalankanProgram()">Jalankan Program</button>
    </div>
    <!DOCTYPE html>
<html>
<body>
    <h1>Tugas OOP</h1>
    <iframe src="https://dartpad.dev/embed-dart.html?id=https://gist.github.com/5c0e154dd50af4a9ac856908061291bc style="width:100%; height:500px;"></iframe>
</body>
</html>

    <script>
        function jalankanProgram() {
            // Dalam aplikasi nyata, ini akan memanggil hasil kompilasi Dart.
            // Sebagai demonstrasi, kita simulasikan outputnya di sini.
            const outputDiv = document.getElementById('console-output');
            outputDiv.innerHTML = `--- DEMO POLIMORFISME ---
Nama pekerja: Budi
Budi sedang menulis kode.
Nama pekerja: Siti
Siti sedang memeriksa pasien.
Nama pekerja: Andi
Andi sedang mengajar di kelas.

--- DEMO INTERFACE TABLET ---
Tablet booting...
Tablet mengambil foto...

--- DEMO MATHUTILS ---
Faktorial 5: 120
Apakah 7 prima?: true
Rata-rata [10, 20]: 15.0`;
        }
    </script>
</body>
</html>
